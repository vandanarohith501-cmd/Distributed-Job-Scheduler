<!DOCTYPE html>
<html>
<head>
    <title>Freelancer Profile</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="dashboard">
    <div class="sidebar">
        <h3>Freelancer</h3>
        <a href="freelancer-dashboard.html">Dashboard</a><br><br>
        <button onclick="toggleTheme()">🌙 Toggle Theme</button>
        <button onclick="logout()">Logout</button>
    </div>

    <div class="content">
        <h2>Create / Update Profile</h2>

        <input type="text" id="education" placeholder="Education">
        <input type="text" id="experience" placeholder="Experience">
        <input type="text" id="skills" placeholder="Skills (comma separated)">
        <input type="text" id="techStack" placeholder="Tech Stack (comma separated)">

        <button onclick="saveProfile()">Save Profile</button>

        <h2>My Profile</h2>
        <div id="profileView" class="card"></div>
    </div>
</div>

<script src="js/profile.js"></script>
</body>
</html>
