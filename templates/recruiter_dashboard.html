{% extends "base.html" %}

{% block content %}
<div class="dashboard">
    <h1>Recruiter Dashboard</h1>
    <p class="subtitle">Manage your job postings and find talent</p>

    <a href="{% url 'add_job' %}" class="btn btn-primary mb-4">+ Add Job</a>

    <div class="dashboard-card">
        <h3>Your Jobs</h3>
        <p class="text-muted">No jobs posted yet. Click "Add Job" to post your first opportunity.</p>
    </div>
</div>

<style>
.dashboard { max-width: 800px; margin: 0 auto; padding: 3rem 2rem; }
.dashboard h1 { font-size: 2rem; margin: 0 0 0.25rem; }
.dashboard .subtitle { color: #8b949e; margin-bottom: 1.5rem; }
.mb-4 { margin-bottom: 1.5rem; display: inline-block; }
.dashboard-card {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 16px;
    padding: 2rem;
}
.dashboard-card h3 { margin: 0 0 1rem; font-size: 1.25rem; }
.text-muted { color: #8b949e; margin: 0; }
</style>
{% endblock %}
